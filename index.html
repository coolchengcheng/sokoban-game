<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>推箱子 Sokoban</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e 50%,#0f3460);color:#eaeaea;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;overflow-x:hidden;touch-action:none}
h1{font-size:28px;margin-bottom:10px;background:linear-gradient(90deg,#ff7b8a,#ffd36e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#top{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;font-size:15px;color:#bbb;margin-bottom:10px}
#top b{color:#ffd36e}
#controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
button{border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:.18s}
button:active{transform:scale(.96)}
.btn-main{background:#e94560;color:#fff}.btn-main:hover{background:#d73e58}
.btn-sub{background:#533483;color:#fff}.btn-sub:hover{background:#62409b}
.btn-lite{background:#163a63;color:#ffd36e;border:1px solid #ffd36e}.btn-lite:hover{background:#224f82}
.btn-tut{background:#214b39;color:#7ff0a8;border:1px solid #7ff0a8}.btn-tut.active{background:#7ff0a8;color:#10241b}
#wrap{display:flex;gap:16px;align-items:flex-start;justify-content:center;flex-wrap:wrap;width:100%;max-width:1100px}
#gameCard,#tutCard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
#gameCard{padding:12px}
canvas{display:block;border-radius:12px;background:#1b2838}
#tutCard{width:320px;padding:14px;max-height:78vh;overflow:auto}
#tutCard.hidden{display:none}
#tutCard h3{font-size:18px;color:#ffd36e;margin-bottom:10px}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#2a2a44;color:#ffd36e;font-size:12px;font-weight:700;margin-bottom:10px}
.sec{margin-bottom:14px}
.sec h4{font-size:12px;letter-spacing:1px;color:#ff8897;text-transform:uppercase;margin-bottom:6px}
.sec p,.sec li{font-size:13px;line-height:1.6;color:#d5d5d5}
.sec ul{padding-left:18px}
#stepsBox{background:rgba(255,215,110,.08);border:1px solid rgba(255,215,110,.22);border-radius:12px;padding:10px}
#stepsBox li{margin-bottom:6px}
.step-key{color:#7ff0a8;font-weight:800}
#legend{font-size:12px;color:#98a4c3;margin-top:10px;line-height:1.7;text-align:center}
#bestRow{font-size:13px;color:#d7dfef;margin-top:10px;text-align:center}
#bestRow b{color:#7ff0a8}
#levelSelect{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:20}
#levelSelect.hidden{display:none}
#levelPanel{background:#111b2f;border:1px solid #2b3a5a;border-radius:18px;padding:18px;max-width:360px;width:92vw}
#levelPanel h2{font-size:22px;color:#ffd36e;text-align:center;margin-bottom:14px}
#levelGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-height:60vh;overflow-y:auto}
.levelBtn{background:#17253f;color:#fff;border:1px solid #314264;border-radius:12px;padding:12px;min-height:96px;text-align:left}
.levelBtn.done{border-color:#45d483;background:#153526}.levelBtn.current{border-color:#ffd36e}.levelBtn.locked{opacity:.48;filter:grayscale(.35);cursor:not-allowed}
.levelBtn b{display:block;font-size:14px;margin-bottom:5px}.levelBtn small{display:block;color:#a8b2cb;line-height:1.45}
.levelMeta{margin-top:6px;color:#ffd36e;font-size:12px;line-height:1.45}
#win{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:25}.hidden{display:none!important}
#winBox{background:#111b2f;padding:22px;border-radius:18px;max-width:360px;width:90vw;text-align:center;border:1px solid #2b3a5a}
#winBox h2{color:#7ff0a8;margin-bottom:8px}#winBox p{color:#d9d9d9;line-height:1.6;margin-bottom:14px}
#mobilePad{display:none;grid-template-columns:64px 64px 64px;grid-template-rows:64px 64px 64px;gap:6px;margin-top:10px}
.pad{border:none;border-radius:12px;font-size:26px;background:rgba(255,255,255,.1);color:#fff}.pad:active{background:rgba(255,255,255,.2)}
.u{grid-column:2;grid-row:1}.l{grid-column:1;grid-row:2}.r{grid-column:3;grid-row:2}.d{grid-column:2;grid-row:3}.c{grid-column:2;grid-row:2;background:transparent}
.confetti-container{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:30}
.confetti-piece{position:absolute;top:-12px;width:10px;height:16px;border-radius:2px;opacity:.95;animation:confetti-fall linear forwards}
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0deg)}100%{transform:translateY(110vh) rotate(720deg)}}
@media(max-width:700px){#tutCard{width:min(95vw,420px)}#mobilePad{display:grid}}
</style>
</head>
<body>
<h1>🎮 推箱子 Sokoban</h1>
<div id="top">关卡 <b id="lv">1/20</b> · 步数 <b id="steps">0</b> · 时间 <b id="timer">0:00</b> · 已完成 <b id="doneCount">0</b></div>
<div id="controls">
  <button class="btn-main" id="undoBtn">↩ 撤销 Z</button>
  <button class="btn-sub" id="resetBtn">🔄 重置 R</button>
  <button class="btn-lite" id="prevBtn">◀ 上一关</button>
  <button class="btn-lite" id="nextBtn">下一关 ▶</button>
  <button class="btn-lite" id="levelSelectBtn">📋 选关</button>
  <button class="btn-lite" id="soundBtn">🔊 音效开</button>
  <button class="btn-tut" id="tutBtn">📖 详细教程 T</button>
</div>
<div id="wrap">
  <div id="gameCard">
    <canvas id="canvas"></canvas>
    <div id="bestRow">最佳纪录：<b id="bestRecord">暂无</b> · 本关评级：<b id="starRecord">未通关</b></div>
    <div id="legend">操作：方向键 / WASD / 手机按钮 ｜ 教程里已经直接写出每一步往哪走</div>
  </div>
  <div id="tutCard" class="hidden">
    <h3 id="tutTitle"></h3>
    <div class="badge" id="difficulty"></div>
    <div class="sec"><h4>这关目标</h4><p id="goalText"></p></div>
    <div class="sec"><h4>傻瓜版思路</h4><p id="simpleTip"></p></div>
    <div class="sec"><h4>一步一步照着走</h4><div id="stepsBox"><ol id="stepList"></ol></div></div>
    <div class="sec"><h4>按键说明</h4><ul><li><span class="step-key">⬆上</span> = 往上走一步</li><li><span class="step-key">⬇下</span> = 往下走一步</li><li><span class="step-key">⬅左</span> = 往左走一步</li><li><span class="step-key">➡右</span> = 往右走一步</li><li>带"<span class="step-key">推箱子</span>"说明这一步会把箱子一起推出去</li></ul></div>
  </div>
</div>
<div id="mobilePad">
  <button class="pad u" data-dx="0" data-dy="-1">⬆</button>
  <button class="pad l" data-dx="-1" data-dy="0">⬅</button>
  <div class="pad c"></div>
  <button class="pad r" data-dx="1" data-dy="0">➡</button>
  <button class="pad d" data-dx="0" data-dy="1">⬇</button>
</div>

<div id="levelSelect" class="hidden"><div id="levelPanel"><h2>选择关卡</h2><div id="levelGrid"></div><div style="text-align:center;margin-top:14px"><button class="btn-sub" id="closeLevelSelectBtn">关闭</button></div></div></div>
<div id="win" class="hidden"><div id="winBox"><h2>🎉 通关啦！</h2><p id="winMsg"></p><div style="display:flex;gap:10px;justify-content:center"><button class="btn-sub" id="replayBtn">重玩本关</button><button class="btn-main" id="nextAfterWin">下一关 ▶</button></div></div></div>
<div class="confetti-container" id="confettiContainer"></div>

<script>
const LEVELS = [
  {
    name: '第一推', difficulty: '⭐ 入门（3步·1箱）',
    map: ['#####','#   #','#.$ #','# @ #','#####'],
    solution: 'RUL',
    tutorialGoal: '先绕到箱子右侧，再把它往左推进目标点。',
    simpleTip: '按 R → U → L，最后那一下就是推箱入位。'
  },
  {
    name: '上顶入位', difficulty: '⭐ 入门（2步·1箱）',
    map: ['######','# .  #','# $  #','#  @ #','######'],
    solution: 'LU',
    tutorialGoal: '目标在箱子正上方，你只需要先站到底下。',
    simpleTip: '先按 L 站到箱子下方，再按 U 一次完成。'
  },
  {
    name: '直推到点', difficulty: '⭐ 入门（1步·1箱）',
    map: ['######','#  . #','#  $ #','#  @ #','######'],
    solution: 'U',
    tutorialGoal: '这是最直接的一关，向上推一次就好。',
    simpleTip: '直接按 ⬆。'
  },
  {
    name: '右手一推', difficulty: '⭐ 入门（3步·1箱）',
    map: ['#####','#   #','# $.#','# @ #','#####'],
    solution: 'LUR',
    tutorialGoal: '先去箱子左边，再把箱子推到右侧目标上。',
    simpleTip: '按 L → U → R，路线很短。'
  },
  {
    name: '落点向下', difficulty: '⭐ 入门（1步·1箱）',
    map: ['#####','# @ #','# $ #','# . #','#####'],
    solution: 'D',
    tutorialGoal: '箱子下面就是目标点，向下推一次即可。',
    simpleTip: '直接按 ⬇。'
  },
  {
    name: '左侧绕位', difficulty: '⭐⭐ 简单（3步·1箱）',
    map: ['#######','# .   #','# $   #','#   @ #','#######'],
    solution: 'LLU',
    tutorialGoal: '玩家离箱子有一点距离，要先往左挪两步再推。',
    simpleTip: 'L → L → U，别急着乱走。'
  },
  {
    name: '右侧绕位', difficulty: '⭐⭐ 简单（3步·1箱）',
    map: ['#######','#   . #','#   $ #','# @   #','#######'],
    solution: 'RRU',
    tutorialGoal: '这次要先往右走到箱子下方，再往上推。',
    simpleTip: 'R → R → U。'
  },
  {
    name: '中央起步', difficulty: '⭐⭐ 简单（2步·1箱）',
    map: ['#######','#  .  #','#  $  #','# @   #','#######'],
    solution: 'RU',
    tutorialGoal: '目标和箱子在中线，先对齐再上推。',
    simpleTip: '先右移一格，再向上推。'
  },
  {
    name: '右后登场', difficulty: '⭐⭐ 简单（2步·1箱）',
    map: ['#######','#  .  #','#  $  #','#   @ #','#######'],
    solution: 'LU',
    tutorialGoal: '你在箱子右下角，只要向左挪一步就能推。',
    simpleTip: 'L → U。'
  },
  {
    name: '高台热身', difficulty: '⭐⭐ 简单（3步·1箱）',
    map: ['########','#    . #','#    $ #','#  @   #','########'],
    solution: 'RRU',
    tutorialGoal: '大房间里先横向站位，再把箱子送上去。',
    simpleTip: '向右两步，向上一推。'
  },
  {
    name: '双星同升', difficulty: '⭐⭐⭐ 进阶（6步·2箱）',
    map: ['#######','# . . #','# $ $ #','#  @  #','#######'],
    solution: 'LURDRU',
    tutorialGoal: '先把左边箱子推上去，再绕回来处理右边箱子。',
    simpleTip: '先左后右，别把顺序弄反。'
  },
  {
    name: '双星落位', difficulty: '⭐⭐⭐ 进阶（6步·2箱）',
    map: ['#######','#  @  #','# $ $ #','# . . #','#######'],
    solution: 'LDRURD',
    tutorialGoal: '两个箱子都要往下送进目标点。',
    simpleTip: '先推左箱下去，再从上方绕去推右箱。'
  },
  {
    name: '长屋双推', difficulty: '⭐⭐⭐ 进阶（8步·2箱）',
    map: ['########','# .  . #','# $  $ #','#   @  #','########'],
    solution: 'LLURRDRU',
    tutorialGoal: '左右两个箱子离得更远，需要多走几步换边。',
    simpleTip: '左箱完成后，从中路绕到右箱下方。'
  },
  {
    name: '双箱下沉', difficulty: '⭐⭐⭐ 进阶（7步·2箱）',
    map: ['########','#  @   #','# $  $ #','# .  . #','########'],
    solution: 'LDRURRD',
    tutorialGoal: '两个箱子都要向下推进，第二个需要从上方切过去。',
    simpleTip: '先左后右，右边那只要多绕一步。'
  },
  {
    name: '三灯同亮', difficulty: '⭐⭐⭐⭐ 挑战（11步·3箱）',
    map: ['########','# . . .#','# $ $ $#','#   @  #','########'],
    solution: 'UDLLURRRDRU',
    tutorialGoal: '先处理中间，再去左边，最后完成最右边。',
    simpleTip: '中 → 左 → 右，这样路线最顺。'
  },
  {
    name: '三箱下场', difficulty: '⭐⭐⭐⭐ 挑战（10步·3箱）',
    map: ['########','#   @  #','# $ $ $#','# . . .#','########'],
    solution: 'DULLDURRRRD',
    tutorialGoal: '三个箱子全部往下推进目标，节奏比上一关更紧。',
    simpleTip: '先压中间，再去左边，最后长距离横移到右边。'
  },
  {
    name: '侧墙练习', difficulty: '⭐⭐ 简单（3步·1箱）',
    map: ['#######','# .   #','#   # #','# $   #','#  @  #','#######'],
    solution: 'LUU',
    tutorialGoal: '旁边多了堵墙，但主路线仍然很干净。',
    simpleTip: '左一步后连按两次上。'
  },
  {
    name: '转身上推', difficulty: '⭐⭐ 简单（4步·1箱）',
    map: ['#######','#   . #','# #   #','#   $ #','# @   #','#######'],
    solution: 'RRUU',
    tutorialGoal: '先横着移动到箱子下方，再连续上推两次。',
    simpleTip: 'R → R → U → U。'
  },
  {
    name: '远端会合', difficulty: '⭐⭐⭐ 进阶（8步·2箱）',
    map: ['########','# . .  #','# $ $  #','#    @ #','########'],
    solution: 'LLLURDRU',
    tutorialGoal: '从最右边出发，先回到左箱，再折返处理右箱。',
    simpleTip: '先连走三步回到左路，再中转去右路。'
  },
  {
    name: '双线收官', difficulty: '⭐⭐⭐⭐ 挑战（8步·2箱）',
    map: ['########','#  . . #','#  $ $ #','# @    #','########'],
    solution: 'RUDRRU',
    tutorialGoal: '最后一关仍然是双箱，但站位更偏，需要先切中线。',
    simpleTip: '先到中间推第一个，再绕去第二个。'
  }
];

const TILE = { FLOOR:0, WALL:1, GOAL:2, BOX:3, BOX_GOAL:4, PLAYER:5, PLAYER_GOAL:6 };
const DIR_TEXT = { U:'⬆上', D:'⬇下', L:'⬅左', R:'➡右' };
const ACClass = window.AudioContext || window.webkitAudioContext;
let ac = null;
let currentLevel = 0, grid = [], rows = 0, cols = 0, playerX = 0, playerY = 0, steps = 0, history = [], completed = new Set(), unlocked = new Set(), showTut = false, cell = 56;
let timerStart = 0, elapsedMs = 0, timerInterval = null;
let soundOn = true;
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');

function ensureAC(){ if(!ac) ac = new ACClass(); if(ac.state==='suspended') ac.resume(); }
function tone(freq,dur,type,vol){
  if(!soundOn || !ACClass) return;
  try{
    ensureAC();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination); o.frequency.value = freq; o.type = type || 'sine';
    g.gain.setValueAtTime(vol || .1, ac.currentTime); g.gain.exponentialRampToValueAtTime(.001, ac.currentTime + dur);
    o.start(ac.currentTime); o.stop(ac.currentTime + dur);
  }catch(e){}
}
function sndMove(){ tone(300+Math.random()*100,.08,'sine',.08); }
function sndPush(){ tone(220,.12,'triangle',.12); setTimeout(()=>tone(280,.1,'triangle',.08),60); }
function sndUndo(){ tone(400,.08,'sawtooth',.06); tone(300,.08,'sawtooth',.06); }
function sndBoxDone(){ tone(523,.15,'sine',.12); setTimeout(()=>tone(659,.15,'sine',.1),100); }
function sndWin(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.3,'sine',.12),i*120)); }
function sndReset(){ tone(250,.15,'square',.06); }

function loadCompleted(){ try{ completed = new Set(JSON.parse(localStorage.getItem('sokoban_done')||'[]')); }catch(e){ completed = new Set(); } }
function saveCompleted(){ localStorage.setItem('sokoban_done', JSON.stringify([...completed])); }
function loadUnlocked(){
  try{ unlocked = new Set(JSON.parse(localStorage.getItem('sokoban_unlocked')||'[]')); }catch(e){ unlocked = new Set(); }
  for(let i=0;i<Math.min(5, LEVELS.length);i++) unlocked.add(i);
}
function saveUnlocked(){ localStorage.setItem('sokoban_unlocked', JSON.stringify([...unlocked].sort((a,b)=>a-b))); }
function isUnlocked(i){ return i>=0 && i<LEVELS.length && (i < 5 || unlocked.has(i)); }
function unlockLevel(i){ if(i>=0 && i<LEVELS.length){ unlocked.add(i); saveUnlocked(); } }
function getBest(idx){ try{ return JSON.parse(localStorage.getItem(`sokoban_best_${idx}`)||'null'); }catch(e){ return null; } }
function saveBest(idx, stepCount, timeMs){
  const prev = getBest(idx);
  const next = { steps: stepCount, time: timeMs };
  if(!prev || stepCount < prev.steps || (stepCount === prev.steps && timeMs < prev.time)){
    localStorage.setItem(`sokoban_best_${idx}`, JSON.stringify(next));
    return next;
  }
  return prev;
}
function getStars(idx){ return Number(localStorage.getItem(`sokoban_stars_${idx}`) || 0); }
function saveStars(idx, stars){
  const best = Math.max(getStars(idx), stars);
  localStorage.setItem(`sokoban_stars_${idx}`, String(best));
  return best;
}
function calcStars(idx, stepCount){
  const optimalSteps = LEVELS[idx].solution.length;
  if(stepCount <= optimalSteps * 1.2) return 3;
  if(stepCount <= optimalSteps * 2) return 2;
  return 1;
}
function starsText(n){ return n ? '⭐'.repeat(n) : '未通关'; }
function formatTime(ms){
  const totalSec = Math.max(0, Math.floor(ms / 1000));
  const min = Math.floor(totalSec / 60);
  const sec = String(totalSec % 60).padStart(2,'0');
  return `${min}:${sec}`;
}
function renderTimer(){ document.getElementById('timer').textContent = formatTime(timerInterval ? Date.now() - timerStart : elapsedMs); }
function startTimer(){ if(timerInterval) return; timerStart = Date.now() - elapsedMs; timerInterval = setInterval(renderTimer, 200); renderTimer(); }
function stopTimer(){ if(timerInterval){ elapsedMs = Date.now() - timerStart; clearInterval(timerInterval); timerInterval = null; } renderTimer(); }
function resetTimer(){ if(timerInterval){ clearInterval(timerInterval); timerInterval = null; } timerStart = 0; elapsedMs = 0; renderTimer(); }
function setSoundButton(){ document.getElementById('soundBtn').textContent = soundOn ? '🔊 音效开' : '🔈 音效关'; }
function renderBest(){
  const best = getBest(currentLevel);
  document.getElementById('bestRecord').textContent = best ? `${best.steps}步 / ${formatTime(best.time)}` : '暂无';
  document.getElementById('starRecord').textContent = starsText(getStars(currentLevel));
}

function parseMap(idx){
  const map = LEVELS[idx].map;
  rows = map.length;
  cols = Math.max(...map.map(r=>r.length));
  grid = [];
  for(let y=0;y<rows;y++){
    grid[y] = [];
    for(let x=0;x<cols;x++){
      const ch = (map[y]||'')[x] || ' ';
      if(ch==='#') grid[y][x]=TILE.WALL;
      else if(ch==='.') grid[y][x]=TILE.GOAL;
      else if(ch==='$') grid[y][x]=TILE.BOX;
      else if(ch==='*') grid[y][x]=TILE.BOX_GOAL;
      else if(ch==='@'){ grid[y][x]=TILE.PLAYER; playerX=x; playerY=y; }
      else if(ch==='+'){ grid[y][x]=TILE.PLAYER_GOAL; playerX=x; playerY=y; }
      else grid[y][x]=TILE.FLOOR;
    }
  }
  steps = 0;
  history = [];
  resetTimer();
  updateUI();
  renderTutorial();
  renderBest();
  draw();
}

function updateUI(){
  document.getElementById('lv').textContent = `${currentLevel+1}/${LEVELS.length}`;
  document.getElementById('steps').textContent = steps;
  document.getElementById('doneCount').textContent = `${completed.size}/${LEVELS.length}`;
  renderTimer();
  setSoundButton();
}

function calcCell(){
  const extra = showTut && window.innerWidth > 700 ? 360 : 0;
  const maxW = Math.min(620, window.innerWidth - 40 - extra);
  const maxH = Math.min(540, window.innerHeight - 250);
  cell = Math.max(28, Math.min(64, Math.floor(Math.min(maxW/cols, maxH/rows))));
}

function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }

function draw(){
  calcCell();
  canvas.width = cols * cell;
  canvas.height = rows * cell;
  ctx.fillStyle = '#1b2838';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
    const t = grid[y][x], px = x*cell, py = y*cell, s = cell;
    if(t===TILE.FLOOR) continue;
    if(t===TILE.WALL){ ctx.fillStyle='#48526b'; ctx.fillRect(px,py,s,s); ctx.fillStyle='#5c6885'; ctx.fillRect(px+2,py+2,s-4,s*.34); ctx.strokeStyle='#364055'; ctx.strokeRect(px+.5,py+.5,s-1,s-1); continue; }
    ctx.fillStyle='#26324a'; ctx.fillRect(px,py,s,s);
    if(t===TILE.GOAL||t===TILE.PLAYER_GOAL){ ctx.fillStyle='rgba(233,69,96,.35)'; ctx.beginPath(); ctx.arc(px+s/2,py+s/2,s*.22,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#ff7b8a'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(px+s*.35,py+s/2); ctx.lineTo(px+s*.65,py+s/2); ctx.moveTo(px+s/2,py+s*.35); ctx.lineTo(px+s/2,py+s*.65); ctx.stroke(); }
    if(t===TILE.BOX||t===TILE.BOX_GOAL){ const ok=t===TILE.BOX_GOAL; ctx.fillStyle='rgba(0,0,0,.25)'; roundRect(px+4,py+5,s-8,s-8,8); ctx.fill(); ctx.fillStyle=ok?'#3fd282':'#d2a53a'; roundRect(px+2,py+2,s-8,s-8,8); ctx.fill(); ctx.strokeStyle=ok?'#208f57':'#9e7d28'; ctx.strokeRect(px+8,py+8,s-20,s-20); ctx.beginPath(); ctx.moveTo(px+10,py+10); ctx.lineTo(px+s-10,py+s-10); ctx.moveTo(px+s-10,py+10); ctx.lineTo(px+10,py+s-10); ctx.stroke(); if(ok){ ctx.fillStyle='#fff'; ctx.font=`${s*.36}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('✓',px+s/2,py+s/2); } }
    if(t===TILE.PLAYER||t===TILE.PLAYER_GOAL){ ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.arc(px+s/2+2,py+s/2+2,s*.34,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#46a5ff'; ctx.beginPath(); ctx.arc(px+s/2,py+s/2,s*.34,0,Math.PI*2); ctx.fill(); ctx.fillStyle='rgba(255,255,255,.35)'; ctx.beginPath(); ctx.arc(px+s*.44,py+s*.4,s*.16,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(px+s*.42,py+s*.43,s*.05,0,Math.PI*2); ctx.arc(px+s*.58,py+s*.43,s*.05,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#fff'; ctx.beginPath(); ctx.arc(px+s/2,py+s*.54,s*.1,.15*Math.PI,.85*Math.PI); ctx.stroke(); }
  }
}

function cloneGrid(){ return grid.map(r=>r.slice()); }
function moveBy(dx,dy){
  const nx = playerX + dx, ny = playerY + dy;
  if(ny<0||ny>=rows||nx<0||nx>=cols) return;
  const target = grid[ny][nx];
  if(target===TILE.WALL) return;
  const snap = { grid: cloneGrid(), x: playerX, y: playerY, steps };
  let pushed = false, boxDone = false;
  if(target===TILE.BOX || target===TILE.BOX_GOAL){
    const bx = nx + dx, by = ny + dy;
    if(by<0||by>=rows||bx<0||bx>=cols) return;
    const behind = grid[by][bx];
    if([TILE.WALL,TILE.BOX,TILE.BOX_GOAL].includes(behind)) return;
    const nextBoxTile = behind===TILE.GOAL ? TILE.BOX_GOAL : TILE.BOX;
    grid[by][bx] = nextBoxTile;
    grid[ny][nx] = target===TILE.BOX_GOAL ? TILE.GOAL : TILE.FLOOR;
    pushed = true;
    boxDone = nextBoxTile === TILE.BOX_GOAL;
  }
  if(!timerStart) startTimer();
  const cur = grid[playerY][playerX];
  grid[playerY][playerX] = cur===TILE.PLAYER_GOAL ? TILE.GOAL : TILE.FLOOR;
  const dest = grid[ny][nx];
  grid[ny][nx] = dest===TILE.GOAL ? TILE.PLAYER_GOAL : TILE.PLAYER;
  playerX = nx;
  playerY = ny;
  steps++;
  history.push(snap);
  updateUI();
  draw();
  if(pushed){ sndPush(); if(boxDone) sndBoxDone(); }
  else sndMove();
  checkWin();
}

function undoMove(){
  const s = history.pop();
  if(!s) return;
  grid = s.grid; playerX = s.x; playerY = s.y; steps = s.steps;
  updateUI(); draw(); sndUndo();
}
function resetLevel(){ sndReset(); parseMap(currentLevel); closeWin(); }
function loadLevel(i){ if(i<0||i>=LEVELS.length||!isUnlocked(i)) return; currentLevel=i; parseMap(i); closeLevelSelect(); closeWin(); }
function prevLevel(){ for(let i=currentLevel-1;i>=0;i--) if(isUnlocked(i)) return loadLevel(i); }
function nextLevel(){ for(let i=currentLevel+1;i<LEVELS.length;i++) if(isUnlocked(i)) return loadLevel(i); }

function spawnConfetti(){
  const wrap = document.getElementById('confettiContainer');
  wrap.innerHTML = '';
  const colors = ['#ffd36e','#ff7b8a','#7ff0a8','#46a5ff','#c485ff'];
  for(let i=0;i<35;i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = `${Math.random()*100}vw`;
    piece.style.background = colors[i % colors.length];
    piece.style.transform = `translateY(-20px) rotate(${Math.random()*180}deg)`;
    piece.style.animationDuration = `${3 + Math.random()*2}s`;
    piece.style.animationDelay = `${Math.random()*.5}s`;
    wrap.appendChild(piece);
  }
  setTimeout(()=>{ wrap.innerHTML = ''; }, 5000);
}

function checkWin(){
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) if(grid[y][x]===TILE.BOX) return;
  stopTimer();
  completed.add(currentLevel);
  saveCompleted();
  unlockLevel(currentLevel + 1);
  const best = saveBest(currentLevel, steps, elapsedMs);
  const stars = saveStars(currentLevel, calcStars(currentLevel, steps));
  updateUI();
  renderBest();
  sndWin();
  spawnConfetti();
  document.getElementById('winMsg').textContent = `你用了 ${steps} 步、${formatTime(elapsedMs)} 完成「${LEVELS[currentLevel].name}」。评级：${starsText(stars)}。最佳纪录：${best.steps}步 / ${formatTime(best.time)}。`;
  document.getElementById('nextAfterWin').style.display = currentLevel===LEVELS.length-1 ? 'none' : '';
  document.getElementById('win').classList.remove('hidden');
}
function closeWin(){ document.getElementById('win').classList.add('hidden'); }

function simulatePushFlags(sol, idx = currentLevel){
  const map = LEVELS[idx].map, localRows = map.length, localCols = Math.max(...map.map(r=>r.length));
  let px, py, g = [];
  for(let y=0;y<localRows;y++){
    g[y] = [];
    for(let x=0;x<localCols;x++){
      const ch = (map[y]||'')[x] || ' ';
      g[y][x] = ch==='#'?1:ch==='.'?2:ch==='@'?5:ch==='+'?6:ch==='$'?3:ch==='*'?4:0;
      if(ch==='@'||ch==='+'){ px=x; py=y; }
    }
  }
  const ds = { U:[0,-1], D:[0,1], L:[-1,0], R:[1,0] }, flags = [];
  for(const m of sol){
    const [dx,dy] = ds[m], nx = px+dx, ny = py+dy, t = g[ny][nx];
    let pushed = false;
    if(t===3||t===4){
      const bx = nx+dx, by = ny+dy;
      g[by][bx] = g[by][bx]===2 ? 4 : 3;
      g[ny][nx] = t===4 ? 2 : 0;
      pushed = true;
    }
    g[py][px] = g[py][px]===6 ? 2 : 0;
    g[ny][nx] = g[ny][nx]===2 ? 6 : 5;
    px = nx; py = ny; flags.push(pushed);
  }
  return flags;
}

function renderTutorial(){
  const lv = LEVELS[currentLevel];
  document.getElementById('tutTitle').textContent = `第 ${currentLevel+1} 关：${lv.name}`;
  document.getElementById('difficulty').textContent = lv.difficulty;
  document.getElementById('goalText').textContent = lv.tutorialGoal;
  document.getElementById('simpleTip').textContent = lv.simpleTip;
  const flags = simulatePushFlags(lv.solution.split(''), currentLevel);
  const list = document.getElementById('stepList');
  list.innerHTML = '';
  lv.solution.split('').forEach((ch,i)=>{
    const li = document.createElement('li');
    li.innerHTML = `<span class="step-key">第 ${i+1} 步：${DIR_TEXT[ch]}</span> -- ${flags[i] ? '这一步会推箱子。' : '这一步只是移动站位。'}`;
    list.appendChild(li);
  });
}

function toggleTutorial(){
  showTut = !showTut;
  document.getElementById('tutCard').classList.toggle('hidden', !showTut);
  document.getElementById('tutBtn').classList.toggle('active', showTut);
  draw();
}
function openLevelSelect(){
  const gridEl = document.getElementById('levelGrid');
  gridEl.innerHTML = '';
  LEVELS.forEach((lv,i)=>{
    const b = document.createElement('button');
    const locked = !isUnlocked(i);
    const stars = getStars(i);
    const best = getBest(i);
    b.className = 'levelBtn' + (completed.has(i) ? ' done' : '') + (i===currentLevel ? ' current' : '') + (locked ? ' locked' : '');
    b.disabled = locked;
    b.innerHTML = `<b>${i+1}. ${lv.name}${locked ? ' 🔒' : ''}</b><small>${lv.difficulty}<br>${lv.tutorialGoal}</small><div class="levelMeta">${locked ? '未解锁' : `评级 ${starsText(stars)}<br>最佳 ${best ? `${best.steps}步 / ${formatTime(best.time)}` : '暂无'}`}</div>`;
    if(!locked) b.addEventListener('click', ()=>loadLevel(i));
    gridEl.appendChild(b);
  });
  document.getElementById('levelSelect').classList.remove('hidden');
}
function closeLevelSelect(){ document.getElementById('levelSelect').classList.add('hidden'); }
function toggleSound(){ soundOn = !soundOn; localStorage.setItem('sokoban_sound', JSON.stringify(soundOn)); setSoundButton(); if(soundOn) sndMove(); }

let resizeTimer = null;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(draw, 150);
});

document.addEventListener('keydown', e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','W','A','S','D'].includes(e.key)) e.preventDefault();
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') moveBy(0,-1);
  else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') moveBy(0,1);
  else if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') moveBy(-1,0);
  else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') moveBy(1,0);
  else if(e.key==='z'||e.key==='Z') undoMove();
  else if(e.key==='r'||e.key==='R') resetLevel();
  else if(e.key==='t'||e.key==='T') toggleTutorial();
  else if(e.key==='Escape'){ closeLevelSelect(); closeWin(); }
});
let sx = 0, sy = 0;
canvas.addEventListener('touchstart',e=>{ const t=e.touches[0]; sx=t.clientX; sy=t.clientY; e.preventDefault(); },{passive:false});
canvas.addEventListener('touchend',e=>{ const t=e.changedTouches[0]; const dx=t.clientX-sx, dy=t.clientY-sy; if(Math.max(Math.abs(dx),Math.abs(dy))<18) return; if(Math.abs(dx)>Math.abs(dy)) moveBy(dx>0?1:-1,0); else moveBy(0,dy>0?1:-1); e.preventDefault(); },{passive:false});

document.getElementById('undoBtn').addEventListener('click', undoMove);
document.getElementById('resetBtn').addEventListener('click', resetLevel);
document.getElementById('prevBtn').addEventListener('click', prevLevel);
document.getElementById('nextBtn').addEventListener('click', nextLevel);
document.getElementById('levelSelectBtn').addEventListener('click', openLevelSelect);
document.getElementById('tutBtn').addEventListener('click', toggleTutorial);
document.getElementById('soundBtn').addEventListener('click', toggleSound);
document.getElementById('closeLevelSelectBtn').addEventListener('click', closeLevelSelect);
document.getElementById('replayBtn').addEventListener('click', ()=>{ resetLevel(); closeWin(); });
document.getElementById('nextAfterWin').addEventListener('click', ()=>{ closeWin(); nextLevel(); });
document.querySelectorAll('#mobilePad .pad[data-dx]').forEach(btn=>btn.addEventListener('click', ()=>moveBy(Number(btn.dataset.dx), Number(btn.dataset.dy))));

loadCompleted();
loadUnlocked();
saveUnlocked();
try{ soundOn = JSON.parse(localStorage.getItem('sokoban_sound') ?? 'true'); }catch(e){ soundOn = true; }
setSoundButton();
parseMap(0);
</script>
