<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>推箱子 Sokoban</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;touch-action:none}
.header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:600px;padding:12px 16px}
.header h1{font-size:1.3em;background:linear-gradient(90deg,#f093fb,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-info{display:flex;gap:16px;font-size:.9em}
.header-info span{opacity:.8}
.header-info strong{color:#f5576c}
.btn{background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:#fff;padding:8px 16px;border-radius:20px;font-size:.85em;cursor:pointer;transition:all .2s;outline:none;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.95)}
.btn-small{padding:6px 12px;font-size:.8em}
.btn-danger{background:linear-gradient(135deg,#f5576c,#ff6b6b)}
.toolbar{display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap;justify-content:center}
.game-container{display:flex;justify-content:center;align-items:center;flex:1;padding:8px;width:100%;max-width:600px}
canvas{border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.3);background:#1a1a2e}
.dpad-container{padding:12px 0 24px;display:none}
.dpad{display:grid;grid-template-columns:64px 64px 64px;grid-template-rows:64px 64px 64px;gap:4px;justify-content:center}
.dpad-btn{width:64px;height:64px;border-radius:14px;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:1.6em;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:background .1s;user-select:none}
.dpad-btn:active{background:rgba(255,255,255,.3)}
.dpad-btn.empty{visibility:hidden}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:none;justify-content:center;align-items:center;z-index:100}
.overlay.show{display:flex}
.overlay-content{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:20px;padding:24px;max-width:400px;width:90%;max-height:80vh;overflow-y:auto}
.overlay-content h2{text-align:center;margin-bottom:16px;background:linear-gradient(90deg,#f093fb,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.level-btn{aspect-ratio:1;border-radius:12px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:1.1em;font-weight:bold;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center}
.level-btn.unlocked{border-color:#667eea;background:rgba(102,126,234,.15)}
.level-btn.completed{border-color:#4ecdc4;background:rgba(78,205,196,.15)}
.level-btn.completed::after{content:'⭐';font-size:.6em}
.level-btn.current{border-color:#f5576c;background:rgba(245,87,108,.2);box-shadow:0 0 12px rgba(245,87,108,.3)}
.level-btn.locked{opacity:.3;cursor:not-allowed}
.level-btn .best{font-size:.5em;opacity:.6;margin-top:2px}
.win-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);display:none;justify-content:center;align-items:center;z-index:200}
.win-overlay.show{display:flex}
.win-content{text-align:center;animation:bounceIn .5s ease}
.win-content h2{font-size:2.5em;margin-bottom:8px}
.win-content p{font-size:1.2em;margin-bottom:20px;opacity:.8}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@media(max-width:768px){.dpad-container{display:block}}
@media(hover:none)and (pointer:coarse){.dpad-container{display:block}}
</style>
</head>
<body>
<div class="header">
<h1>🧩 推箱子</h1>
<div class="header-info">
<span>关卡 <strong id="levelNum">1</strong></span>
<span>步数 <strong id="stepCount">0</strong></span>
</div>
</div>
<div class="toolbar">
<button class="btn btn-small" onclick="G.undo()">↩ 撤销</button>
<button class="btn btn-small btn-danger" onclick="G.resetLevel()">🔄 重置</button>
<button class="btn btn-small" onclick="G.showLS()">📋 关卡</button>
</div>
<div class="game-container">
<canvas id="cv"></canvas>
</div>
<div class="dpad-container">
<div class="dpad">
<div class="dpad-btn empty"></div>
<button class="dpad-btn" ontouchstart="G.mv(0,-1);event.preventDefault()" onclick="G.mv(0,-1)">▲</button>
<div class="dpad-btn empty"></div>
<button class="dpad-btn" ontouchstart="G.mv(-1,0);event.preventDefault()" onclick="G.mv(-1,0)">◀</button>
<div class="dpad-btn empty"></div>
<button class="dpad-btn" ontouchstart="G.mv(1,0);event.preventDefault()" onclick="G.mv(1,0)">▶</button>
<div class="dpad-btn empty"></div>
<button class="dpad-btn" ontouchstart="G.mv(0,1);event.preventDefault()" onclick="G.mv(0,1)">▼</button>
<div class="dpad-btn empty"></div>
</div>
</div>
<div class="overlay" id="lsOverlay">
<div class="overlay-content">
<h2>选择关卡</h2>
<div class="level-grid" id="lsGrid"></div>
<div style="text-align:center;margin-top:16px"><button class="btn" onclick="G.hideLS()">返回游戏</button></div>
</div>
</div>
<div class="win-overlay" id="winO">
<div class="win-content">
<div style="font-size:3em">🎉</div>
<h2>过关！</h2>
<p id="winMsg"></p>
<div style="display:flex;gap:12px;justify-content:center">
<button class="btn" onclick="G.nextLv()">下一关 ▶</button>
<button class="btn btn-small" onclick="G.resetLevel();G.hideWin()">重玩</button>
</div>
</div>
</div>
<script>
const LEVELS=[
{n:"初识",m:["  ###  ","  # #  ","  # #  ","###$####","#. $@. #","########"]},
{n:"入门",m:["####  ","#. ## ","#  $ #","# $@.#","######"]},
{n:"转角",m:[" ####  "," #  ## "," # $ # ","##$ .# ","#  .@# ","#   ## ","##### "]},
{n:"双推",m:["######","#    #","# #$.#","# $@.#","#  ###","####  "]},
{n:"迂回",m:[" #####","##   #","#  $ #","#.#$ #","#. @##","#  # ","#### "]},
{n:"三连",m:["###### ","#    # ","# ##$##","# # . #","#  $. #","##$@. #"," ######"]},
{n:"回廊",m:[" ######"," # ...#","## #$ #","#  $ ##","# $# # ","#  @ # ","###### "]},
{n:"交错",m:["  #### ","###  ##","#   $.#","# #$#.#","#   $.#","###@ ##","  #### "]},
{n:"迷宫",m:["########","#  ....#","# # ## #","# $$ $ #","## $ ###"," # @#  "," #  #  "," ####  "]},
{n:"终极",m:[" ######","##....#","# $$$ #","#. $  #","## $ ##"," # @ # "," # # # "," #   # "," ##### "]}
];
const W=1,F=2,T=3,B=4,BT=5;
let actx=null;
function snd(t){
  if(!actx)try{actx=new(window.AudioContext||window.webkitAudioContext)}catch(e){return}
  const n=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);
  if(t==='m'){o.frequency.value=220;o.type='sine';g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.001,n+.08);o.start(n);o.stop(n+.08)}
  else if(t==='p'){o.frequency.setValueAtTime(180,n);o.frequency.setValueAtTime(260,n+.05);o.type='square';g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.12);o.start(n);o.stop(n+.12)}
  else if(t==='t'){o.frequency.setValueAtTime(523,n);o.frequency.setValueAtTime(659,n+.1);o.type='sine';g.gain.setValueAtTime(.15,n);g.gain.exponentialRampToValueAtTime(.001,n+.25);o.start(n);o.stop(n+.25)}
  else if(t==='w'){[523,659,784,1047].forEach((f,i)=>{const o2=actx.createOscillator(),g2=actx.createGain();o2.connect(g2);g2.connect(actx.destination);o2.frequency.value=f;o2.type='sine';g2.gain.setValueAtTime(.15,n+i*.15);g2.gain.exponentialRampToValueAtTime(.001,n+i*.15+.3);o2.start(n+i*.15);o2.stop(n+i*.15+.3)})}
}
const G={
  cv:null,c:null,lv:0,grid:[],px:0,py:0,steps:0,hist:[],won:false,
  comp:JSON.parse(localStorage.getItem('sok_c')||'[]'),
  best:JSON.parse(localStorage.getItem('sok_b')||'{}'),
  init(){
    this.cv=document.getElementById('cv');this.c=this.cv.getContext('2d');
    this.load(0);this.input();
    window.addEventListener('resize',()=>this.draw());
  },
  save(){localStorage.setItem('sok_c',JSON.stringify(this.comp));localStorage.setItem('sok_b',JSON.stringify(this.best))},
  load(i){
    if(i<0||i>=LEVELS.length)return;
    this.lv=i;this.steps=0;this.hist=[];this.won=false;
    const rows=LEVELS[i].m,mw=Math.max(...rows.map(r=>r.length));
    this.grid=[];
    for(let y=0;y<rows.length;y++){
      const row=[];
      for(let x=0;x<mw;x++){
        const ch=rows[y][x]||' ';
        if(ch==='#')row.push(W);
        else if(ch==='.')row.push(T);
        else if(ch==='$')row.push(B);
        else if(ch==='*')row.push(BT);
        else if(ch==='@'){row.push(F);this.px=x;this.py=y}
        else if(ch==='+'){row.push(T);this.px=x;this.py=y}
        else row.push(0);
      }
      this.grid.push(row);
    }
    this.flood();
    document.getElementById('levelNum').textContent=i+1;
    document.getElementById('stepCount').textContent='0';
    this.draw();
  },
  flood(){
    const h=this.grid.length,w=this.grid[0].length;
    const vis=Array.from({length:h},()=>Array(w).fill(false));
    const q=[[this.px,this.py]];vis[this.py][this.px]=true;
    while(q.length){
      const[cx,cy]=q.shift();
      for(const[dx,dy]of[[0,1],[0,-1],[1,0],[-1,0]]){
        const nx=cx+dx,ny=cy+dy;
        if(nx>=0&&nx<w&&ny>=0&&ny<h&&!vis[ny][nx]){
          const t=this.grid[ny][nx];
          if(t!==W){vis[ny][nx]=true;if(t===0)this.grid[ny][nx]=F;q.push([nx,ny])}
        }
      }
    }
  },
  input(){
    document.addEventListener('keydown',e=>{
      if(this.won)return;
      const k=e.key;
      if(k==='ArrowUp'||k==='w'||k==='W'){this.mv(0,-1);e.preventDefault()}
      else if(k==='ArrowDown'||k==='s'||k==='S'){this.mv(0,1);e.preventDefault()}
      else if(k==='ArrowLeft'||k==='a'||k==='A'){this.mv(-1,0);e.preventDefault()}
      else if(k==='ArrowRight'||k==='d'||k==='D'){this.mv(1,0);e.preventDefault()}
      else if(k==='z'&&(e.ctrlKey||e.metaKey)){this.undo();e.preventDefault()}
    });
    let sx,sy;
    this.cv.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;e.preventDefault()},{passive:false});
    this.cv.addEventListener('touchend',e=>{
      if(this.won)return;
      const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
      if(Math.max(Math.abs(dx),Math.abs(dy))<20)return;
      if(Math.abs(dx)>Math.abs(dy))this.mv(dx>0?1:-1,0);else this.mv(0,dy>0?1:-1);
      e.preventDefault();
    },{passive:false});
  },
  mv(dx,dy){
    if(this.won)return;
    if(!actx)try{actx=new(window.AudioContext||window.webkitAudioContext)}catch(e){}
    const nx=this.px+dx,ny=this.py+dy,h=this.grid.length,w=this.grid[0].length;
    if(nx<0||nx>=w||ny<0||ny>=h)return;
    const tg=this.grid[ny][nx];
    if(tg===W||tg===0)return;
    if(tg===B||tg===BT){
      const bx=nx+dx,by=ny+dy;
      if(bx<0||bx>=w||by<0||by>=h)return;
      const bh=this.grid[by][bx];
      if(bh!==F&&bh!==T)return;
      this.hist.push({px:this.px,py:this.py,g:this.grid.map(r=>[...r])});
      this.grid[by][bx]=(bh===T)?BT:B;
      this.grid[ny][nx]=(tg===BT)?T:F;
      this.px=nx;this.py=ny;this.steps++;
      snd(this.grid[by][bx]===BT?'t':'p');
    }else{
      this.hist.push({px:this.px,py:this.py,g:this.grid.map(r=>[...r])});
      this.px=nx;this.py=ny;this.steps++;
      snd('m');
    }
    document.getElementById('stepCount').textContent=this.steps;
    this.draw();this.chk();
  },
  undo(){
    if(!this.hist.length||this.won)return;
    const s=this.hist.pop();this.px=s.px;this.py=s.py;this.grid=s.g;this.steps--;
    document.getElementById('stepCount').textContent=this.steps;this.draw();
  },
  resetLevel(){this.load(this.lv);this.hideWin()},
  chk(){
    for(let y=0;y<this.grid.length;y++)for(let x=0;x<this.grid[0].length;x++)if(this.grid[y][x]===T)return;
    this.won=true;snd('w');
    if(!this.comp.includes(this.lv))this.comp.push(this.lv);
    const k='l'+this.lv;if(!this.best[k]||this.steps<this.best[k])this.best[k]=this.steps;
    this.save();
    setTimeout(()=>{document.getElementById('winMsg').textContent='用了 '+this.steps+' 步完成！';document.getElementById('winO').classList.add('show')},300);
  },
  nextLv(){this.hideWin();if(this.lv<LEVELS.length-1)this.load(this.lv+1);else alert('🎉 恭喜通关所有关卡！')},
  hideWin(){document.getElementById('winO').classList.remove('show')},
  showLS(){
    const g=document.getElementById('lsGrid');g.innerHTML='';
    for(let i=0;i<LEVELS.length;i++){
      const b=document.createElement('button');b.className='level-btn';
      const done=this.comp.includes(i),unlk=i===0||this.comp.includes(i-1)||done,cur=i===this.lv;
      if(cur)b.classList.add('current');else if(done)b.classList.add('completed');else if(unlk)b.classList.add('unlocked');else b.classList.add('locked');
      let h=''+(i+1);const bs=this.best['l'+i];if(bs)h+='<span class="best">'+bs+'步</span>';
      b.innerHTML=h;
      if(unlk||done)(idx=>b.onclick=()=>{this.load(idx);this.hideLS()})(i);
      g.appendChild(b);
    }
    document.getElementById('lsOverlay').classList.add('show');
  },
  hideLS(){document.getElementById('lsOverlay').classList.remove('show')},
  draw(){
    const h=this.grid.length,w=this.grid[0].length;
    const ct=document.querySelector('.game-container');
    const mw=ct.clientWidth-16,mh=ct.clientHeight-16;
    const s=Math.min(Math.floor(mw/w),Math.floor(mh/h),64);
    const cw=s*w,ch=s*h;
    this.cv.width=cw;this.cv.height=ch;this.cv.style.width=cw+'px';this.cv.style.height=ch+'px';
    const c=this.c;
    c.fillStyle='#1a1a2e';c.fillRect(0,0,cw,ch);
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
      const t=this.grid[y][x],px=x*s,py=y*s,r=s*.1,m=2;
      if(t===0)continue;
      if(t!==W){c.fillStyle='#16213e';c.fillRect(px+1,py+1,s-2,s-2)}
      if(t===W){
        const gd=c.createLinearGradient(px,py,px+s,py+s);gd.addColorStop(0,'#4a4a6a');gd.addColorStop(1,'#2a2a4a');
        c.fillStyle=gd;c.beginPath();c.roundRect(px+m,py+m,s-m*2,s-m*2,r);c.fill();
        c.strokeStyle='rgba(0,0,0,.3)';c.lineWidth=1;c.beginPath();c.moveTo(px,py+s/2);c.lineTo(px+s,py+s/2);c.stroke();
      }
      if(t===T){
        c.fillStyle='rgba(245,87,108,.3)';c.beginPath();c.arc(px+s/2,py+s/2,s*.2,0,Math.PI*2);c.fill();
        c.strokeStyle='#f5576c';c.lineWidth=2;c.beginPath();c.arc(px+s/2,py+s/2,s*.2,0,Math.PI*2);c.stroke();
      }
      if(t===B){
        const gd=c.createLinearGradient(px,py,px+s,py+s);gd.addColorStop(0,'#f5af19');gd.addColorStop(1,'#f12711');
        c.fillStyle=gd;c.beginPath();c.roundRect(px+m+2,py+m+2,s-m*2-4,s-m*2-4,r);c.fill();
        c.strokeStyle='rgba(255,255,255,.3)';c.lineWidth=1;c.beginPath();c.roundRect(px+m+2,py+m+2,s-m*2-4,s-m*2-4,r);c.stroke();
      }
      if(t===BT){
        const gd=c.createLinearGradient(px,py,px+s,py+s);gd.addColorStop(0,'#11998e');gd.addColorStop(1,'#38ef7d');
        c.fillStyle=gd;c.beginPath();c.roundRect(px+m+2,py+m+2,s-m*2-4,s-m*2-4,r);c.fill();
        c.strokeStyle='rgba(255,255,255,.5)';c.lineWidth=2;c.beginPath();c.roundRect(px+m+2,py+m+2,s-m*2-4,s-m*2-4,r);c.stroke();
        c.fillStyle='rgba(255,255,255,.3)';c.beginPath();c.arc(px+s/2,py+s/2,s*.12,0,Math.PI*2);c.fill();
      }
    }
    // Player
    const ppx=this.px*s,ppy=this.py*s;
    const gd=c.createRadialGradient(ppx+s/2,ppy+s*.4,s*.05,ppx+s/2,ppy+s/2,s*.4);
    gd.addColorStop(0,'#667eea');gd.addColorStop(1,'#764ba2');
    c.fillStyle=gd;c.beginPath();c.arc(ppx+s/2,ppy+s/2,s*.35,0,Math.PI*2);c.fill();
    c.fillStyle='#fff';c.beginPath();c.arc(ppx+s*.4,ppy+s*.4,s*.08,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(ppx+s*.6,ppy+s*.4,s*.08,0,Math.PI*2);c.fill();
    c.fillStyle='#1a1a2e';c.beginPath();c.arc(ppx+s*.4,ppy+s*.42,s*.04,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(ppx+s*.6,ppy+s*.42,s*.04,0,Math.PI*2);c.fill();
    c.strokeStyle='#fff';c.lineWidth=1.5;c.beginPath();c.arc(ppx+s/2,ppy+s*.58,s*.1,0,Math.PI);c.stroke();
  }
};
G.init();
</script>
</body>
</html>
