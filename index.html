<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>推箱子 Sokoban</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e 50%,#0f3460);color:#eaeaea;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;overflow-x:hidden;touch-action:none}
h1{font-size:28px;margin-bottom:10px;background:linear-gradient(90deg,#ff7b8a,#ffd36e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#top{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;font-size:15px;color:#bbb;margin-bottom:10px}
#top b{color:#ffd36e}
#controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
button{border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:.18s}
button:active{transform:scale(.96)}
.btn-main{background:#e94560;color:#fff}.btn-main:hover{background:#d73e58}
.btn-sub{background:#533483;color:#fff}.btn-sub:hover{background:#62409b}
.btn-lite{background:#163a63;color:#ffd36e;border:1px solid #ffd36e}.btn-lite:hover{background:#224f82}
.btn-tut{background:#214b39;color:#7ff0a8;border:1px solid #7ff0a8}.btn-tut.active{background:#7ff0a8;color:#10241b}
#wrap{display:flex;gap:16px;align-items:flex-start;justify-content:center;flex-wrap:wrap;width:100%;max-width:1100px}
#gameCard,#tutCard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
#gameCard{padding:12px}
canvas{display:block;border-radius:12px;background:#1b2838}
#tutCard{width:320px;padding:14px;max-height:78vh;overflow:auto}
#tutCard.hidden{display:none}
#tutCard h3{font-size:18px;color:#ffd36e;margin-bottom:10px}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#2a2a44;color:#ffd36e;font-size:12px;font-weight:700;margin-bottom:10px}
.sec{margin-bottom:14px}
.sec h4{font-size:12px;letter-spacing:1px;color:#ff8897;text-transform:uppercase;margin-bottom:6px}
.sec p,.sec li{font-size:13px;line-height:1.6;color:#d5d5d5}
.sec ul{padding-left:18px}
#stepsBox{background:rgba(255,215,110,.08);border:1px solid rgba(255,215,110,.22);border-radius:12px;padding:10px}
#stepsBox li{margin-bottom:6px}
.step-key{color:#7ff0a8;font-weight:800}
#legend{font-size:12px;color:#98a4c3;margin-top:10px;line-height:1.7;text-align:center}
#levelSelect{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:20}
#levelSelect.hidden{display:none}
#levelPanel{background:#111b2f;border:1px solid #2b3a5a;border-radius:18px;padding:18px;max-width:360px;width:92vw}
#levelPanel h2{font-size:22px;color:#ffd36e;text-align:center;margin-bottom:14px}
#levelGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.levelBtn{background:#17253f;color:#fff;border:1px solid #314264;border-radius:12px;padding:12px;min-height:78px;text-align:left}
.levelBtn.done{border-color:#45d483;background:#153526}.levelBtn.current{border-color:#ffd36e}
.levelBtn b{display:block;font-size:14px;margin-bottom:5px}.levelBtn small{display:block;color:#a8b2cb;line-height:1.45}
#win{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:25}.hidden{display:none!important}
#winBox{background:#111b2f;padding:22px;border-radius:18px;max-width:360px;width:90vw;text-align:center;border:1px solid #2b3a5a}
#winBox h2{color:#7ff0a8;margin-bottom:8px}#winBox p{color:#d9d9d9;line-height:1.6;margin-bottom:14px}
#mobilePad{display:none;grid-template-columns:64px 64px 64px;grid-template-rows:64px 64px 64px;gap:6px;margin-top:10px}
.pad{border:none;border-radius:12px;font-size:26px;background:rgba(255,255,255,.1);color:#fff}.pad:active{background:rgba(255,255,255,.2)}
.u{grid-column:2;grid-row:1}.l{grid-column:1;grid-row:2}.r{grid-column:3;grid-row:2}.d{grid-column:2;grid-row:3}.c{grid-column:2;grid-row:2;background:transparent}
@media(max-width:700px){#tutCard{width:min(95vw,420px)}#mobilePad{display:grid}}
</style>
</head>
<body>
<h1>🎮 推箱子 Sokoban</h1>
<div id="top">关卡 <b id="lv">1/7</b> · 步数 <b id="steps">0</b> · 已完成 <b id="doneCount">0</b></div>
<div id="controls">
  <button class="btn-main" onclick="undoMove()">↩ 撤销 Z</button>
  <button class="btn-sub" onclick="resetLevel()">🔄 重置 R</button>
  <button class="btn-lite" onclick="prevLevel()">◀ 上一关</button>
  <button class="btn-lite" onclick="nextLevel()">下一关 ▶</button>
  <button class="btn-lite" onclick="openLevelSelect()">📋 选关</button>
  <button class="btn-tut" id="tutBtn" onclick="toggleTutorial()">📖 详细教程 T</button>
</div>
<div id="wrap">
  <div id="gameCard">
    <canvas id="canvas"></canvas>
    <div id="legend">操作：方向键 / WASD / 手机按钮 ｜ 教程里已经直接写出每一步往哪走</div>
  </div>
  <div id="tutCard" class="hidden">
    <h3 id="tutTitle"></h3>
    <div class="badge" id="difficulty"></div>
    <div class="sec"><h4>这关目标</h4><p id="goalText"></p></div>
    <div class="sec"><h4>傻瓜版思路</h4><p id="simpleTip"></p></div>
    <div class="sec"><h4>一步一步照着走</h4><div id="stepsBox"><ol id="stepList"></ol></div></div>
    <div class="sec"><h4>按键说明</h4><ul><li><span class="step-key">⬆上</span> = 往上走一步</li><li><span class="step-key">⬇下</span> = 往下走一步</li><li><span class="step-key">⬅左</span> = 往左走一步</li><li><span class="step-key">➡右</span> = 往右走一步</li><li>带"<span class="step-key">推箱子</span>"说明这一步会把箱子一起推出去</li></ul></div>
  </div>
</div>
<div id="mobilePad">
  <button class="pad u" onclick="moveBy(0,-1)">⬆</button>
  <button class="pad l" onclick="moveBy(-1,0)">⬅</button>
  <div class="pad c"></div>
  <button class="pad r" onclick="moveBy(1,0)">➡</button>
  <button class="pad d" onclick="moveBy(0,1)">⬇</button>
</div>

<div id="levelSelect" class="hidden"><div id="levelPanel"><h2>选择关卡</h2><div id="levelGrid"></div><div style="text-align:center;margin-top:14px"><button class="btn-sub" onclick="closeLevelSelect()">关闭</button></div></div></div>
<div id="win" class="hidden"><div id="winBox"><h2>🎉 通关啦！</h2><p id="winMsg"></p><div style="display:flex;gap:10px;justify-content:center"><button class="btn-sub" onclick="resetLevel();closeWin()">重玩本关</button><button class="btn-main" id="nextAfterWin" onclick="nextLevel();closeWin()">下一关 ▶</button></div></div></div>

<script>
const LEVELS = [
  {
    name: '第一推', difficulty: '⭐ 入门（2步）',
    map: ['#####','#   #','#.$ #','#  @#','#####'],
    solution: 'UL',
    tutorialGoal: '把箱子📦往左推到红色目标点🎯上。',
    simpleTip: '最简单的一关，只要 2 步！先按 ⬆ 走到箱子右边，再按 ⬅ 把箱子推进目标。'
  },
  {
    name: '直线三推', difficulty: '⭐ 入门（5步）',
    map: ['#####','#.  #','#   #','# $ #','# @ #','#####'],
    solution: 'UURUL',
    tutorialGoal: '箱子在中间，目标在左上角。需要先把箱子往上顶两次，再绕到右边从右往左推。',
    simpleTip: '先连按两次 ⬆ 把箱子推上去，然后按 ➡ 绕到箱子右边，按 ⬆ 走到箱子上方，最后按 ⬅ 推进目标。'
  },
  {
    name: '右推入点', difficulty: '⭐ 入门（2步）',
    map: ['#####','#   #','# $.#','#@  #','#####'],
    solution: 'UR',
    tutorialGoal: '箱子右边就是目标点，走过去推一下就行。',
    simpleTip: '按 ⬆ 站到箱子左边，再按 ➡ 推进去。2 步搞定！'
  },
  {
    name: '绕路推箱', difficulty: '⭐⭐ 简单（4步）',
    map: ['######','#    #','# $  #','# .@ #','######'],
    solution: 'UULD',
    tutorialGoal: '箱子在上面，目标在下面。不能直接推下去——需要绕到箱子上方，再往下推。',
    simpleTip: '先连按两次 ⬆ 绕到箱子上方，再按 ⬅ 对准箱子正上方，最后按 ⬇ 把箱子推到目标点。'
  },
  {
    name: '上下两送', difficulty: '⭐⭐ 简单（5步）',
    map: ['######','# .  #','# $  #','# @  #','# $  #','# .  #','######'],
    solution: 'URDLD',
    tutorialGoal: '两个箱子、两个目标。上面的箱子推到上面的目标，下面的推到下面的目标。',
    simpleTip: '先按 ⬆ 把上面箱子推进上方目标，然后绕路（➡⬇⬅）到下面箱子上方，最后按 ⬇ 推进下方目标。'
  },
  {
    name: '双箱入门', difficulty: '⭐⭐⭐ 中等（8步）',
    map: ['#######','#     #','# .$  #','#  @  #','# .$  #','#     #','#######'],
    solution: 'RULDRDLU',
    tutorialGoal: '左右排列的两组箱子+目标。先处理上面那组，再处理下面那组。',
    simpleTip: '先绕到上面箱子的右边（➡⬆），向左推进目标（⬅）。再绕到下面箱子右边（⬇➡⬇），向左推进目标（⬅）。照抄就行！'
  },
  {
    name: '双箱交叉', difficulty: '⭐⭐⭐ 中等（7步）',
    map: ['########','#      #','# .$   #','#  @   #','#  $.  #','#      #','########'],
    solution: 'RULDLDR',
    tutorialGoal: '上面的箱子往左推，下面的箱子往右推，交叉送到各自的目标。',
    simpleTip: '先绕到上面箱子右边（➡⬆），向左推（⬅）。再绕到下面箱子左边（⬇⬅⬇），向右推（➡）。7步完成！'
  }
];

const TILE = { FLOOR:0, WALL:1, GOAL:2, BOX:3, BOX_GOAL:4, PLAYER:5, PLAYER_GOAL:6 };
const DIR_TEXT = { U:'⬆上', D:'⬇下', L:'⬅左', R:'➡右' };
let currentLevel = 0, grid = [], rows = 0, cols = 0, playerX = 0, playerY = 0, steps = 0, history = [], completed = new Set(), showTut = false, cell = 56;
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');

function loadCompleted(){ try{ completed = new Set(JSON.parse(localStorage.getItem('sokoban_done')||'[]')); }catch(e){ completed = new Set(); } }
function saveCompleted(){ localStorage.setItem('sokoban_done', JSON.stringify([...completed])); }

function parseMap(idx){
  const map = LEVELS[idx].map; rows = map.length; cols = Math.max(...map.map(r=>r.length)); grid = [];
  for(let y=0;y<rows;y++){
    grid[y]=[];
    for(let x=0;x<cols;x++){
      const ch = (map[y]||'')[x] || ' ';
      if(ch==='#') grid[y][x]=TILE.WALL;
      else if(ch==='.') grid[y][x]=TILE.GOAL;
      else if(ch==='$') grid[y][x]=TILE.BOX;
      else if(ch==='*') grid[y][x]=TILE.BOX_GOAL;
      else if(ch==='@'){ grid[y][x]=TILE.PLAYER; playerX=x; playerY=y; }
      else if(ch==='+'){ grid[y][x]=TILE.PLAYER_GOAL; playerX=x; playerY=y; }
      else grid[y][x]=TILE.FLOOR;
    }
  }
  steps=0; history=[]; updateUI(); renderTutorial(); draw();
}

function updateUI(){
  document.getElementById('lv').textContent = `${currentLevel+1}/${LEVELS.length}`;
  document.getElementById('steps').textContent = steps;
  document.getElementById('doneCount').textContent = `${completed.size}/${LEVELS.length}`;
}

function calcCell(){
  const extra = showTut && window.innerWidth > 700 ? 360 : 0;
  const maxW = Math.min(620, window.innerWidth - 40 - extra);
  const maxH = Math.min(540, window.innerHeight - 230);
  cell = Math.max(28, Math.min(64, Math.floor(Math.min(maxW/cols, maxH/rows))));
}

function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }

function draw(){
  calcCell(); canvas.width = cols*cell; canvas.height = rows*cell; ctx.fillStyle='#1b2838'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
    const t = grid[y][x], px = x*cell, py = y*cell, s = cell;
    if(t===TILE.FLOOR) continue;
    if(t===TILE.WALL){ ctx.fillStyle='#48526b'; ctx.fillRect(px,py,s,s); ctx.fillStyle='#5c6885'; ctx.fillRect(px+2,py+2,s-4,s*.34); ctx.strokeStyle='#364055'; ctx.strokeRect(px+.5,py+.5,s-1,s-1); continue; }
    ctx.fillStyle='#26324a'; ctx.fillRect(px,py,s,s);
    if(t===TILE.GOAL||t===TILE.PLAYER_GOAL){ ctx.fillStyle='rgba(233,69,96,.35)'; ctx.beginPath(); ctx.arc(px+s/2,py+s/2,s*.22,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#ff7b8a'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(px+s*.35,py+s/2); ctx.lineTo(px+s*.65,py+s/2); ctx.moveTo(px+s/2,py+s*.35); ctx.lineTo(px+s/2,py+s*.65); ctx.stroke(); }
    if(t===TILE.BOX||t===TILE.BOX_GOAL){ const ok=t===TILE.BOX_GOAL; ctx.fillStyle='rgba(0,0,0,.25)'; roundRect(px+4,py+5,s-8,s-8,8); ctx.fill(); ctx.fillStyle=ok?'#3fd282':'#d2a53a'; roundRect(px+2,py+2,s-8,s-8,8); ctx.fill(); ctx.strokeStyle=ok?'#208f57':'#9e7d28'; ctx.strokeRect(px+8,py+8,s-20,s-20); ctx.beginPath(); ctx.moveTo(px+10,py+10); ctx.lineTo(px+s-10,py+s-10); ctx.moveTo(px+s-10,py+10); ctx.lineTo(px+10,py+s-10); ctx.stroke(); if(ok){ ctx.fillStyle='#fff'; ctx.font=`${s*.36}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('✓',px+s/2,py+s/2); } }
    if(t===TILE.PLAYER||t===TILE.PLAYER_GOAL){ ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.arc(px+s/2+2,py+s/2+2,s*.34,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#46a5ff'; ctx.beginPath(); ctx.arc(px+s/2,py+s/2,s*.34,0,Math.PI*2); ctx.fill(); ctx.fillStyle='rgba(255,255,255,.35)'; ctx.beginPath(); ctx.arc(px+s*.44,py+s*.4,s*.16,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(px+s*.42,py+s*.43,s*.05,0,Math.PI*2); ctx.arc(px+s*.58,py+s*.43,s*.05,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#fff'; ctx.beginPath(); ctx.arc(px+s/2,py+s*.54,s*.1,.15*Math.PI,.85*Math.PI); ctx.stroke(); }
  }
}

function cloneGrid(){ return grid.map(r=>r.slice()); }
function moveBy(dx,dy){
  const nx = playerX+dx, ny = playerY+dy; if(ny<0||ny>=rows||nx<0||nx>=cols) return;
  const target = grid[ny][nx]; if(target===TILE.WALL) return;
  const snap = { grid: cloneGrid(), x: playerX, y: playerY, steps };
  if(target===TILE.BOX || target===TILE.BOX_GOAL){
    const bx = nx+dx, by = ny+dy; if(by<0||by>=rows||bx<0||bx>=cols) return;
    const behind = grid[by][bx]; if([TILE.WALL,TILE.BOX,TILE.BOX_GOAL].includes(behind)) return;
    grid[by][bx] = behind===TILE.GOAL ? TILE.BOX_GOAL : TILE.BOX;
    grid[ny][nx] = target===TILE.BOX_GOAL ? TILE.GOAL : TILE.FLOOR;
  }
  const cur = grid[playerY][playerX]; grid[playerY][playerX] = cur===TILE.PLAYER_GOAL ? TILE.GOAL : TILE.FLOOR;
  const dest = grid[ny][nx]; grid[ny][nx] = dest===TILE.GOAL ? TILE.PLAYER_GOAL : TILE.PLAYER;
  playerX = nx; playerY = ny; steps++; history.push(snap); updateUI(); draw(); checkWin();
}

function undoMove(){ const s = history.pop(); if(!s) return; grid=s.grid; playerX=s.x; playerY=s.y; steps=s.steps; updateUI(); draw(); }
function resetLevel(){ parseMap(currentLevel); }
function loadLevel(i){ if(i<0||i>=LEVELS.length) return; currentLevel=i; parseMap(i); closeLevelSelect(); closeWin(); }
function prevLevel(){ loadLevel(currentLevel-1); }
function nextLevel(){ loadLevel(currentLevel+1); }

function checkWin(){
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) if(grid[y][x]===TILE.BOX) return;
  completed.add(currentLevel); saveCompleted(); updateUI();
  document.getElementById('winMsg').textContent = `你用了 ${steps} 步完成「${LEVELS[currentLevel].name}」。如果卡关，下一关也能直接点"详细教程"照着走。`;
  document.getElementById('nextAfterWin').style.display = currentLevel===LEVELS.length-1 ? 'none' : '';
  document.getElementById('win').classList.remove('hidden');
}
function closeWin(){ document.getElementById('win').classList.add('hidden'); }

function stepSentence(ch, i, arr){
  const dir = DIR_TEXT[ch];
  const nextPush = (()=>{
    const sim = simulatePushFlags(arr);
    return sim[i];
  })();
  return nextPush ? `${dir} -- 这一步会推箱子。` : `${dir} -- 单纯移动站位。`;
}

function simulatePushFlags(sol){
  const map = LEVELS[currentLevel].map, rows = map.length, cols = Math.max(...map.map(r=>r.length));
  let px,py, g=[]; for(let y=0;y<rows;y++){ g[y]=[]; for(let x=0;x<cols;x++){ const ch=(map[y]||'')[x]||' '; g[y][x]=ch==='#'?1:ch==='.'?2:ch==='@'?5:ch==='+'?6:ch==='$'?3:ch==='*'?4:0; if(ch==='@'||ch==='+'){px=x;py=y;} } }
  const ds={U:[0,-1],D:[0,1],L:[-1,0],R:[1,0]}, flags=[];
  for(const m of sol){ const [dx,dy]=ds[m], nx=px+dx, ny=py+dy; const t=g[ny][nx]; let pushed=false; if(t===3||t===4){ const bx=nx+dx, by=ny+dy; g[by][bx]=g[by][bx]===2?4:3; g[ny][nx]=t===4?2:0; pushed=true; } g[py][px]=g[py][px]===6?2:0; g[ny][nx]=g[ny][nx]===2?6:5; px=nx; py=ny; flags.push(pushed); }
  return flags;
}

function renderTutorial(){
  const lv = LEVELS[currentLevel];
  document.getElementById('tutTitle').textContent = `第 ${currentLevel+1} 关：${lv.name}`;
  document.getElementById('difficulty').textContent = lv.difficulty;
  document.getElementById('goalText').textContent = lv.tutorialGoal;
  document.getElementById('simpleTip').textContent = lv.simpleTip;
  const flags = simulatePushFlags(lv.solution.split(''));
  const list = document.getElementById('stepList'); list.innerHTML='';
  lv.solution.split('').forEach((ch,i)=>{
    const li = document.createElement('li');
    li.innerHTML = `<span class="step-key">第 ${i+1} 步：${DIR_TEXT[ch]}</span> -- ${flags[i] ? '这一步会推箱子。' : '这一步只是移动站位。'}`;
    list.appendChild(li);
  });
}

function toggleTutorial(){ showTut = !showTut; document.getElementById('tutCard').classList.toggle('hidden', !showTut); document.getElementById('tutBtn').classList.toggle('active', showTut); draw(); }
function openLevelSelect(){ const gridEl = document.getElementById('levelGrid'); gridEl.innerHTML=''; LEVELS.forEach((lv,i)=>{ const b=document.createElement('button'); b.className='levelBtn'+(completed.has(i)?' done':'')+(i===currentLevel?' current':''); b.innerHTML=`<b>${i+1}. ${lv.name}</b><small>${lv.difficulty}<br>${lv.tutorialGoal}</small>`; b.onclick=()=>loadLevel(i); gridEl.appendChild(b); }); document.getElementById('levelSelect').classList.remove('hidden'); }
function closeLevelSelect(){ document.getElementById('levelSelect').classList.add('hidden'); }

window.addEventListener('resize', draw);
document.addEventListener('keydown', e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','W','A','S','D'].includes(e.key)) e.preventDefault();
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') moveBy(0,-1);
  else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') moveBy(0,1);
  else if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') moveBy(-1,0);
  else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') moveBy(1,0);
  else if(e.key==='z'||e.key==='Z') undoMove();
  else if(e.key==='r'||e.key==='R') resetLevel();
  else if(e.key==='t'||e.key==='T') toggleTutorial();
  else if(e.key==='Escape'){ closeLevelSelect(); closeWin(); }
});
let sx=0, sy=0;
canvas.addEventListener('touchstart',e=>{ const t=e.touches[0]; sx=t.clientX; sy=t.clientY; e.preventDefault(); },{passive:false});
canvas.addEventListener('touchend',e=>{ const t=e.changedTouches[0]; const dx=t.clientX-sx, dy=t.clientY-sy; if(Math.max(Math.abs(dx),Math.abs(dy))<18) return; if(Math.abs(dx)>Math.abs(dy)) moveBy(dx>0?1:-1,0); else moveBy(0,dy>0?1:-1); e.preventDefault(); },{passive:false});

loadCompleted(); parseMap(0);
</script>
